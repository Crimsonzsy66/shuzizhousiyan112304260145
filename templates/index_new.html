<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔢 Kaggle数字识别系统 v2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #2a5298;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .header .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .canvas-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }
        
        .section-title {
            color: #2a5298;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #drawCanvas {
            border: 3px solid #2a5298;
            border-radius: 10px;
            cursor: crosshair;
            background: white;
            display: block;
            margin: 0 auto;
        }
        
        .canvas-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        .upload-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }
        
        .upload-area {
            border: 3px dashed #2a5298;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: white;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .upload-text {
            color: #666;
            margin-bottom: 5px;
        }
        
        .upload-hint {
            font-size: 12px;
            color: #999;
        }
        
        #fileInput {
            display: none;
        }
        
        .preview-container {
            display: none;
            margin-top: 15px;
            text-align: center;
        }
        
        .preview-container.show {
            display: block;
        }
        
        #previewImage {
            max-width: 150px;
            border-radius: 10px;
            border: 2px solid #2a5298;
        }
        
        .result-section {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            color: white;
            display: none;
        }
        
        .result-section.show {
            display: block;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .prediction-display {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .prediction-number {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .confidence-text {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .probabilities-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        
        .prob-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .prob-card:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
        }
        
        .prob-number {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .prob-bar-bg {
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        
        .prob-bar {
            height: 100%;
            background: white;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .prob-value {
            font-size: 12px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 12px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        
        .stat-item {
            background: #f8f9fa;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .stat-value {
            font-weight: bold;
            color: #2a5298;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔢 Kaggle 数字识别系统</h1>
            <p class="subtitle">基于CNN深度学习模型的手写数字识别</p>
            <span class="badge">v2.0 新版界面</span>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <span class="stat-value">CNN</span> 神经网络
            </div>
            <div class="stat-item">
                <span class="stat-value">98%+</span> 准确率
            </div>
            <div class="stat-item">
                <span class="stat-value">MNIST</span> 数据集
            </div>
        </div>
        
        <div class="main-content">
            <div class="canvas-section">
                <div class="section-title">
                    ✏️ 手写输入
                </div>
                <canvas id="drawCanvas" width="280" height="280"></canvas>
                <div class="canvas-buttons">
                    <button class="btn btn-secondary" onclick="clearCanvas()">🗑️ 清除</button>
                    <button class="btn btn-primary" onclick="predictFromCanvas()">🔍 识别</button>
                </div>
            </div>
            
            <div class="upload-section">
                <div class="section-title">
                    📷 图片上传
                </div>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon">🖼️</div>
                    <div class="upload-text">点击或拖拽上传图片</div>
                    <div class="upload-hint">支持 JPG, PNG, BMP 格式</div>
                </div>
                <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
                
                <div class="preview-container" id="previewContainer">
                    <img id="previewImage" src="" alt="预览">
                    <button class="btn btn-primary" onclick="predict()" style="margin-top: 15px; width: 100%;">🔍 开始识别</button>
                </div>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>正在识别中...</div>
            </div>
            
            <div class="result-section" id="resultSection">
                <div class="prediction-display">
                    <div class="prediction-number" id="predictionNumber">0</div>
                    <div class="confidence-text">置信度: <span id="confidenceValue">0</span>%</div>
                </div>
                <div class="probabilities-grid" id="probabilitiesGrid"></div>
            </div>
        </div>
        
        <div class="footer">
            <p>基于 PyTorch CNN 模型 | Kaggle 数字识别竞赛</p>
        </div>
    </div>
    
    <script>
        let canvas = document.getElementById('drawCanvas');
        let ctx = canvas.getContext('2d');
        let isDrawing = false;
        let selectedFile = null;
        
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 20;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        
        canvas.addEventListener('touchstart', handleTouch);
        canvas.addEventListener('touchmove', handleTouchMove);
        canvas.addEventListener('touchend', stopDrawing);
        
        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(x, y);
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
        }
        
        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.beginPath();
            ctx.moveTo(x, y);
        }
        
        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
        }
        
        function stopDrawing() {
            isDrawing = false;
        }
        
        function clearCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('previewContainer').classList.remove('show');
            selectedFile = null;
        }
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImage').src = e.target.result;
                    document.getElementById('previewContainer').classList.add('show');
                    document.getElementById('resultSection').classList.remove('show');
                };
                reader.readAsDataURL(file);
            }
        }
        
        function predict() {
            if (!selectedFile) return;
            
            document.getElementById('loading').classList.add('show');
            document.getElementById('resultSection').classList.remove('show');
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            fetch('/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(result => {
                displayResult(result);
            })
            .catch(error => {
                alert('识别失败: ' + error.message);
            })
            .finally(() => {
                document.getElementById('loading').classList.remove('show');
            });
        }
        
        function predictFromCanvas() {
            document.getElementById('loading').classList.add('show');
            document.getElementById('resultSection').classList.remove('show');
            
            const dataUrl = canvas.toDataURL('image/png');
            
            fetch('/api/predict_base64', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ image: dataUrl })
            })
            .then(response => response.json())
            .then(result => {
                displayResult(result);
            })
            .catch(error => {
                alert('识别失败: ' + error.message);
            })
            .finally(() => {
                document.getElementById('loading').classList.remove('show');
            });
        }
        
        function displayResult(result) {
            if (result.error) {
                alert('识别失败: ' + result.error);
                return;
            }
            
            document.getElementById('predictionNumber').textContent = result.prediction;
            document.getElementById('confidenceValue').textContent = result.probabilities[result.prediction];
            
            const grid = document.getElementById('probabilitiesGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i <= 9; i++) {
                const prob = result.probabilities[i] || 0;
                const card = document.createElement('div');
                card.className = 'prob-card';
                card.innerHTML = `
                    <div class="prob-number">${i}</div>
                    <div class="prob-bar-bg">
                        <div class="prob-bar" style="width: ${prob}%"></div>
                    </div>
                    <div class="prob-value">${prob}%</div>
                `;
                grid.appendChild(card);
            }
            
            document.getElementById('resultSection').classList.add('show');
        }
    </script>
</body>
</html>
